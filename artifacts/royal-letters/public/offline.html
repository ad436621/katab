<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — الرسائل الملكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Rakkas&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FAF7F0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 28px,
        rgba(201,168,76,0.06) 28px, rgba(201,168,76,0.06) 29px
      );
      font-family: 'Cairo', sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .seal {
      width: 80px; height: 80px;
      background: radial-gradient(circle at 40% 35%, #8B1A1A, #5C0D0D);
      border-radius: 50%;
      border: 3px solid #C9A84C;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rakkas', serif;
      font-size: 2rem; color: #C9A84C;
      margin: 0 auto 2rem;
      box-shadow: 0 0 30px rgba(201,168,76,0.3), inset 0 2px 4px rgba(255,255,255,0.1);
    }
    h1 {
      font-family: 'Rakkas', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      color: #2C1810;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #C9A84C, #E8C96A, #B8943C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h2 {
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      color: #5a4231;
      font-weight: 400;
      margin-bottom: 2rem;
    }
    p {
      color: #8b7355;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      max-width: 320px;
      line-height: 1.7;
    }
    .retry-btn {
      background: linear-gradient(135deg, #C9A84C, #B8943C);
      color: white;
      border: none;
      padding: 0.875rem 2.5rem;
      border-radius: 50px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,168,76,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      min-height: 48px;
    }
    .retry-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.5); }
    .retry-btn:active { transform: translateY(0); }
    .wifi-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="wifi-icon">📡</div>
  <div class="seal">أ</div>
  <h1>أنت غير متصل</h1>
  <h2>You are currently offline</h2>
  <p>تعذّر الاتصال بالإنترنت. تحقق من اتصالك وحاول مجدداً.</p>
  <button class="retry-btn" onclick="window.location.reload()">
    إعادة المحاولة
  </button>
</body>
</html>
